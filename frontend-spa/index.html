<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Library Digital</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="app"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script type="module">
    import App from './components/App.js';
    import Home from './components/Home.js';
    import Login from './components/Login.js';
    import Dashboard from './components/Dashboard.js';
    import Buku from './components/Buku.js';
    import Kategori from './components/Kategori.js';
    import Penulis from './components/Penulis.js';
    import Anggota from './components/Anggota.js';
    import Peminjaman from './components/Peminjaman.js';

    // Base URL API
   axios.defaults.baseURL = 'http://127.0.0.1:8080';

    // Axios Request Interceptor — inject token otomatis
    axios.interceptors.request.use(config => {
      const token = localStorage.getItem('token');
      if (token) config.headers['Authorization'] = `Bearer ${token}`;
      return config;
    });

    // Axios Response Interceptor — tangkap 401
    axios.interceptors.response.use(
      res => res,
      err => {
        if (err.response && err.response.status === 401) {
          alert('Sesi habis! Silakan login kembali.');
          localStorage.clear();
          router.push('/login');
        }
        return Promise.reject(err);
      }
    );

    const routes = [
      { path: '/',           component: Home },
      { path: '/login',      component: Login },
      { path: '/dashboard',  component: Dashboard, meta: { requiresAuth: true } },
      { path: '/buku',       component: Buku,       meta: { requiresAuth: true } },
      { path: '/kategori',   component: Kategori,   meta: { requiresAuth: true } },
      { path: '/penulis',    component: Penulis,    meta: { requiresAuth: true } },
      { path: '/anggota',    component: Anggota,    meta: { requiresAuth: true } },
      { path: '/peminjaman', component: Peminjaman, meta: { requiresAuth: true } },
    ];

    const router = VueRouter.createRouter({
      history: VueRouter.createWebHashHistory(),
      routes
    });

    // Navigation Guard
    router.beforeEach((to, from, next) => {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      if (to.meta.requiresAuth && !isLoggedIn) {
        next('/login');
      } else {
        next();
      }
    });

    Vue.createApp(App).use(router).mount('#app');
  </script>
</body>
</html>
